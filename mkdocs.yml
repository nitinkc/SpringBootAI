site_name: Spring Boot AI Integration Guide
site_description: Comprehensive guide to integrating LLM capabilities into Spring Boot services
repo_url: https://github.com/example/springbootAI
site_author: AI Engineering Team

theme:
  name: material
  color_mode: auto
  user_color_mode_toggle: true
  primary: teal
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  highlightjs: true
  hljs_languages:
    - yaml
    - java
    - python
    - javascript
    - go
    - sql
    - bash
  features:
    - toc.integrate
    - navigation.tabs
    - navigation.instant

plugins:
  - search

markdown_extensions:
  - toc:
      toc_depth: 2-3
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      use_pygments: true
      anchor_linenums: true
      auto_title: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - abbr
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js
  - https://unpkg.com/mermaid@10/dist/mermaid.js
  - js/mermaid-init.js
  - js/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - https://unpkg.com/mermaid@10/dist/mermaid.css
  - css/custom.css

nav:
  - Home: index.md
  
  - Core Concepts:
    - LLM Integration Overview: concepts/llm-integration.md
    - Service Layer AI Pattern: concepts/service-layer-ai.md
    - Abstraction & Dependency Injection: concepts/abstraction-di.md
    - Design Decision Matrix: concepts/design-decisions.md
  
  - Use Cases:
    - Product Search: use-cases/product-search.md
    - Support Tickets: use-cases/support-tickets.md
    - Recommendations: use-cases/recommendations.md
    - Pattern Comparison: use-cases/pattern-comparison.md
  
  - Observability:
    - Monitoring & Metrics: observability/monitoring.md
    - Logging Strategy: observability/logging.md
    - Cost Tracking: observability/cost-tracking.md
    - Performance Analysis: observability/performance.md
  
  - Implementation:
    - Best Practices: implementation/best-practices.md
    - Performance Optimization: implementation/performance.md
    - Error Handling: implementation/error-handling.md
  
  - Interview Preparation:
    - Architecture Questions: interview/architecture-qa.md
    - Design Pattern Questions: interview/design-patterns.md
    - System Design Questions: interview/system-design.md
    - Observability Questions: interview/observability-qa.md
    - Behavioral Questions: interview/behavioral.md
  
  - Future Development:
    - Skills, Prompts & Agents: future/skills-prompts-agents.md
    - Available Agents: future/agents.md
    - Future Use Cases: future/use-cases.md
